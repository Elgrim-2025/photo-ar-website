<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AR 크로마키 - 업로드</title>
    <link rel="stylesheet" href="/css/upload.css">
</head>
<body>
    <div id="app">
        <!-- Step 1: File Upload -->
        <section id="upload-section">
            <h1>AR 크로마키</h1>
            <p class="desc">사진이나 영상을 업로드하고<br>배경색을 선택하세요</p>

            <div id="drop-zone">
                <div id="drop-icon">+</div>
                <p>파일을 여기에 끌어놓거나<br>탭하여 선택하세요</p>
                <input type="file" id="file-input" accept="image/jpeg,image/png,video/mp4,video/webm" hidden>
                <button id="select-file-btn">파일 선택</button>
            </div>
            <div id="file-info" class="hidden"></div>
        </section>

        <!-- Step 2: Color Selection -->
        <section id="color-section" class="hidden">
            <h2>제거할 배경색 선택</h2>

            <div id="preset-colors">
                <button class="color-preset active" data-color="#00ff00" style="background:#00ff00;" title="초록">초록</button>
                <button class="color-preset" data-color="#0000ff" style="background:#0000ff;color:#fff;" title="파랑">파랑</button>
                <button class="color-preset" data-color="#ff0000" style="background:#ff0000;color:#fff;" title="빨강">빨강</button>
                <button class="color-preset" data-color="#ffffff" style="background:#ffffff;border:1px solid #666;" title="흰색">흰색</button>
                <button class="color-preset" data-color="#000000" style="background:#000000;color:#fff;" title="검정">검정</button>
            </div>

            <div id="custom-color-row">
                <label for="custom-color">직접 선택:</label>
                <input type="color" id="custom-color" value="#00ff00">
            </div>

            <div id="adjustment-sliders">
                <label>색상 허용 범위: <span id="sim-value">0.40</span></label>
                <input type="range" id="similarity-slider" min="0.1" max="0.8" step="0.05" value="0.4">

                <label>경계 부드러움: <span id="smooth-value">0.10</span></label>
                <input type="range" id="smoothness-slider" min="0.0" max="0.3" step="0.02" value="0.1">
            </div>
        </section>

        <!-- Step 3: Preview -->
        <section id="preview-section" class="hidden">
            <h2>미리보기</h2>
            <div id="preview-container">
                <canvas id="preview-canvas"></canvas>
            </div>
            <p class="hint">체크무늬 = 투명 영역</p>
        </section>

        <!-- Step 4: Generate Link -->
        <section id="generate-section" class="hidden">
            <button id="generate-btn">AR 링크 생성</button>
            <div id="upload-progress" class="hidden">
                <div id="progress-bar"><div id="progress-fill"></div></div>
                <span id="progress-text">업로드 중...</span>
            </div>
        </section>

        <!-- Step 5: Result -->
        <section id="result-section" class="hidden">
            <h2>AR 링크가 생성되었습니다!</h2>
            <div id="result-link-box">
                <input type="text" id="result-link" readonly>
                <button id="copy-link-btn">복사</button>
            </div>
            <a id="open-ar-link" href="#" target="_blank">AR 보기 열기</a>
            <button id="new-upload-btn">새 파일 업로드</button>
        </section>
    </div>

    <script src="/js/upload.js"></script>
</body>
</html>
