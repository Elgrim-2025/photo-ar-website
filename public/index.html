<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AR 크로마키 - 업로드</title>
    <link rel="stylesheet" href="/css/upload.css">
</head>
<body>
    <div id="app">
        <header>
            <h1>AR 크로마키</h1>
            <p class="desc">사진·영상 최대 3개 업로드</p>
        </header>

        <!-- 프로젝트 제목 -->
        <div id="title-section">
            <input type="text" id="project-title" placeholder="프로젝트 이름 (선택)" maxlength="50" autocomplete="off" spellcheck="false">
        </div>

        <!-- 파일 슬롯 (JS가 동적으로 추가) -->
        <div id="slots-container"></div>

        <!-- 파일 추가 버튼 -->
        <button id="add-slot-btn" class="hidden">+ 파일 추가</button>

        <!-- 미리보기 -->
        <div id="preview-section" class="hidden">
            <h2>미리보기</h2>
            <canvas id="preview-canvas"></canvas>
            <p class="hint">체크무늬 = 투명 영역</p>
        </div>

        <!-- 업로드 -->
        <div id="generate-section" class="hidden">
            <button id="generate-btn">AR 링크 생성</button>
            <div id="upload-progress" class="hidden">
                <div id="progress-bar"><div id="progress-fill"></div></div>
                <span id="progress-text">업로드 중...</span>
            </div>
        </div>

        <!-- 결과 -->
        <section id="result-section" class="hidden">
            <h2>AR 링크가 생성되었습니다!</h2>
            <div id="result-link-box">
                <input type="text" id="result-link" readonly>
                <button id="copy-link-btn">복사</button>
            </div>
            <div id="qrcode-box">
                <p class="qr-label">폰으로 스캔하세요</p>
                <div id="qrcode"></div>
            </div>
            <a id="open-ar-link" href="#" target="_blank">AR 보기 열기</a>
            <button id="new-upload-btn">새로 업로드</button>
        </section>

        <footer>
            <a href="/manage" id="manage-link">업로드 목록 관리</a>
        </footer>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="/js/upload.js"></script>
</body>
</html>
