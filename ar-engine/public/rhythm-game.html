<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>리듬 게임 - The General Uses Warp</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
            background: #000;
            width: 100vw;
            height: 100vh;
        }

        /* 게임 컨테이너 */
        #game-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
        }

        /* 카메라 배경 */
        #video-background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.8;
        }

        /* 게임 캔버스 */
        #game-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        /* HUD 오버레이 */
        #hud {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }

        /* 점수 표시 */
        #score-display {
            position: absolute;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
        }

        #score {
            color: #fff;
            font-size: 48px;
            font-weight: bold;
            text-shadow: 0 0 20px rgba(77, 166, 255, 0.8);
        }

        #combo {
            color: #4da6ff;
            font-size: 32px;
            font-weight: bold;
            text-shadow: 0 0 15px rgba(77, 166, 255, 0.6);
            margin-top: 5px;
        }

        #combo.celebration {
            animation: celebrate 0.5s ease;
            color: #ffaa00;
        }

        @keyframes celebrate {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.3); }
        }

        /* 판정 표시 */
        #judgment {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 64px;
            font-weight: bold;
            opacity: 0;
            pointer-events: none;
            text-shadow: 0 0 20px rgba(0, 0, 0, 0.8);
        }

        #judgment.show {
            animation: judgmentAnim 0.5s ease;
        }

        @keyframes judgmentAnim {
            0% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
            50% { opacity: 1; transform: translate(-50%, -50%) scale(1.2); }
            100% { opacity: 0; transform: translate(-50%, -50%) scale(1); }
        }

        /* 시작 화면 */
        #start-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            transition: opacity 0.5s ease;
        }

        #start-screen.hidden {
            opacity: 0;
            pointer-events: none;
        }

        #start-screen h1 {
            color: #4da6ff;
            font-size: 42px;
            margin-bottom: 20px;
            text-shadow: 0 0 30px rgba(77, 166, 255, 0.6);
        }

        #start-screen p {
            color: #888;
            font-size: 18px;
            margin-bottom: 40px;
            text-align: center;
        }

        #start-btn {
            padding: 20px 60px;
            background: linear-gradient(135deg, #4da6ff, #80c0ff);
            border: none;
            border-radius: 50px;
            color: #000;
            font-size: 24px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 30px rgba(77, 166, 255, 0.5);
            transition: all 0.3s ease;
        }

        #start-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 6px 40px rgba(77, 166, 255, 0.7);
        }

        #start-btn:active {
            transform: scale(0.95);
        }

        /* 게임 오버 화면 */
        #gameover-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        #gameover-screen.show {
            display: flex;
        }

        #gameover-screen h2 {
            color: #4da6ff;
            font-size: 48px;
            margin-bottom: 30px;
            text-shadow: 0 0 30px rgba(77, 166, 255, 0.6);
        }

        #final-score {
            color: #fff;
            font-size: 36px;
            margin-bottom: 40px;
        }

        #restart-btn {
            padding: 15px 50px;
            background: linear-gradient(135deg, #4da6ff, #80c0ff);
            border: none;
            border-radius: 50px;
            color: #000;
            font-size: 20px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 30px rgba(77, 166, 255, 0.5);
            transition: all 0.3s ease;
        }

        #restart-btn:hover {
            transform: scale(1.05);
        }

        /* 축하 비디오 오버레이 */
        #celebration-video {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 50;
            display: none;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        #celebration-video.show {
            display: block;
            opacity: 1;
        }

        /* 프로그레스 바 */
        #progress-bar {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 80%;
            height: 8px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 4px;
            overflow: hidden;
        }

        #progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #4da6ff, #80c0ff);
            width: 0%;
            transition: width 0.1s linear;
        }
    </style>
</head>
<body>
    <!-- 시작 화면 -->
    <div id="start-screen">
        <h1>🎵 리듬 게임 🎵</h1>
        <p>박자에 맞춰 동그라미를 터치하세요!<br>10 콤보 달성 시 특별한 축하가 기다립니다!</p>
        <button id="start-btn">게임 시작</button>
    </div>

    <!-- 게임 컨테이너 -->
    <div id="game-container">
        <!-- 카메라 배경 (현실 배경) -->
        <video id="video-background" playsinline autoplay muted></video>

        <!-- 게임 캔버스 -->
        <canvas id="game-canvas"></canvas>

        <!-- HUD 오버레이 -->
        <div id="hud">
            <div id="score-display">
                <div id="score">0</div>
                <div id="combo"></div>
            </div>
            <div id="judgment"></div>
            <div id="progress-bar">
                <div id="progress-fill"></div>
            </div>
        </div>
    </div>

    <!-- 축하 비디오 -->
    <video id="celebration-video" playsinline></video>

    <!-- 게임 오버 화면 -->
    <div id="gameover-screen">
        <h2>게임 종료!</h2>
        <div id="final-score">최종 점수: <span id="final-score-value">0</span></div>
        <button id="restart-btn">다시 하기</button>
    </div>

    <script>
        // ========================================
        // 게임 설정
        // ========================================
        const CONFIG = {
            AUDIO_FILE: 'The General Uses Warp.mp3',
            VIDEO_NORMAL: 'rydm.mp4',
            VIDEO_CELEBRATION: 'kim-cos-chroma.mp4',
            COMBO_THRESHOLD: 10,
            NOTE_SPEED: 3,
            JUDGMENT_PERFECT: 50,
            JUDGMENT_GOOD: 100,
            JUDGMENT_OK: 150,
            SPAWN_LANES: 4,
            NOTE_RADIUS: 40,
            TARGET_RADIUS: 60,
            HIT_ZONE_Y: 0.85
        };

        // ========================================
        // 게임 상태
        // ========================================
        const gameState = {
            score: 0,
            combo: 0,
            maxCombo: 0,
            isPlaying: false,
            celebrationShown: false,
            notes: [],
            audio: null,
            startTime: 0
        };

        // ========================================
        // 박자 맵 (BPM 분석 결과)
        // ========================================
        // The General Uses Warp는 약 140 BPM
        const BPM = 140;
        const BEAT_INTERVAL = 60 / BPM; // 0.428초

        // 노트 생성 타이밍 (초 단위)
        function generateBeatMap(duration) {
            const beatMap = [];
            let time = 1.0; // 1초부터 시작
            
            while (time < duration - 2) {
                // 기본 박자
                beatMap.push({ time, lane: Math.floor(Math.random() * CONFIG.SPAWN_LANES) });
                
                // 8비트 패턴 (더 빠른 노트)
                if (Math.random() > 0.5) {
                    beatMap.push({ 
                        time: time + BEAT_INTERVAL / 2, 
                        lane: Math.floor(Math.random() * CONFIG.SPAWN_LANES) 
                    });
                }
                
                time += BEAT_INTERVAL;
            }
            
            return beatMap;
        }

        // ========================================
        // DOM 요소
        // ========================================
        const canvas = document.getElementById('game-canvas');
        const ctx = canvas.getContext('2d');
        const startScreen = document.getElementById('start-screen');
        const gameoverScreen = document.getElementById('gameover-screen');
        const videoBackground = document.getElementById('video-background');
        const celebrationVideo = document.getElementById('celebration-video');
        const scoreDisplay = document.getElementById('score');
        const comboDisplay = document.getElementById('combo');
        const judgmentDisplay = document.getElementById('judgment');
        const progressFill = document.getElementById('progress-fill');
        const finalScoreValue = document.getElementById('final-score-value');

        // ========================================
        // 캔버스 크기 설정
        // ========================================
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // ========================================
        // 레인 계산
        // ========================================
        function getLaneX(lane) {
            const spacing = canvas.width / (CONFIG.SPAWN_LANES + 1);
            return spacing * (lane + 1);
        }

        // ========================================
        // 노트 클래스
        // ========================================
        class Note {
            constructor(time, lane) {
                this.spawnTime = time;
                this.lane = lane;
                this.x = getLaneX(lane);
                this.y = -CONFIG.NOTE_RADIUS;
                this.targetY = canvas.height * CONFIG.HIT_ZONE_Y;
                this.hit = false;
                this.missed = false;
            }

            update(currentTime) {
                const elapsed = currentTime - this.spawnTime;
                const travelTime = 2.0; // 노트가 화면을 가로지르는 시간 (2초)
                const progress = elapsed / travelTime;
                
                this.y = -CONFIG.NOTE_RADIUS + progress * (this.targetY + CONFIG.NOTE_RADIUS);

                // 놓친 노트 체크
                if (this.y > this.targetY + CONFIG.JUDGMENT_OK && !this.hit && !this.missed) {
                    this.missed = true;
                    gameState.combo = 0;
                    comboDisplay.textContent = '';
                }
            }

            draw() {
                if (this.hit || this.missed) return;

                // 노트 그림자
                ctx.save();
                ctx.shadowColor = 'rgba(77, 166, 255, 0.8)';
                ctx.shadowBlur = 20;
                
                // 노트 외곽선
                ctx.beginPath();
                ctx.arc(this.x, this.y, CONFIG.NOTE_RADIUS, 0, Math.PI * 2);
                ctx.strokeStyle = '#4da6ff';
                ctx.lineWidth = 4;
                ctx.stroke();
                
                // 노트 내부
                const gradient = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, CONFIG.NOTE_RADIUS);
                gradient.addColorStop(0, 'rgba(77, 166, 255, 0.8)');
                gradient.addColorStop(1, 'rgba(77, 166, 255, 0.3)');
                ctx.fillStyle = gradient;
                ctx.fill();
                
                ctx.restore();
            }

            checkHit(touchX, touchY) {
                const distance = Math.sqrt((touchX - this.x) ** 2 + (touchY - this.y) ** 2);
                const timingError = Math.abs(this.y - this.targetY);

                if (distance < CONFIG.NOTE_RADIUS + CONFIG.TARGET_RADIUS && !this.hit) {
                    this.hit = true;

                    if (timingError < CONFIG.JUDGMENT_PERFECT) {
                        return { judgment: 'PERFECT!', score: 100, color: '#ffaa00' };
                    } else if (timingError < CONFIG.JUDGMENT_GOOD) {
                        return { judgment: 'GOOD', score: 50, color: '#4da6ff' };
                    } else if (timingError < CONFIG.JUDGMENT_OK) {
                        return { judgment: 'OK', score: 20, color: '#aaa' };
                    }
                }
                return null;
            }
        }

        // ========================================
        // 타겟 그리기
        // ========================================
        function drawTargets() {
            const targetY = canvas.height * CONFIG.HIT_ZONE_Y;
            
            for (let i = 0; i < CONFIG.SPAWN_LANES; i++) {
                const x = getLaneX(i);
                
                ctx.save();
                ctx.globalAlpha = 0.3;
                
                // 타겟 외곽선
                ctx.beginPath();
                ctx.arc(x, targetY, CONFIG.TARGET_RADIUS, 0, Math.PI * 2);
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 3;
                ctx.stroke();
                
                // 타겟 내부
                ctx.beginPath();
                ctx.arc(x, targetY, CONFIG.TARGET_RADIUS - 10, 0, Math.PI * 2);
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 2;
                ctx.stroke();
                
                ctx.restore();
            }
        }

        // ========================================
        // 판정 표시
        // ========================================
        function showJudgment(judgment, color) {
            judgmentDisplay.textContent = judgment;
            judgmentDisplay.style.color = color;
            judgmentDisplay.classList.remove('show');
            void judgmentDisplay.offsetWidth; // 리플로우 강제
            judgmentDisplay.classList.add('show');
        }

        // ========================================
        // 점수 업데이트
        // ========================================
        function updateScore(points) {
            gameState.score += points;
            gameState.combo++;
            
            if (gameState.combo > gameState.maxCombo) {
                gameState.maxCombo = gameState.combo;
            }

            scoreDisplay.textContent = gameState.score;
            comboDisplay.textContent = gameState.combo > 0 ? `${gameState.combo} COMBO` : '';

            // 10 콤보 달성 시 축하
            if (gameState.combo === CONFIG.COMBO_THRESHOLD && !gameState.celebrationShown) {
                showCelebration();
            }
        }

        // ========================================
        // 축하 비디오 표시
        // ========================================
        function showCelebration() {
            gameState.celebrationShown = true;
            comboDisplay.classList.add('celebration');
            
            celebrationVideo.src = CONFIG.VIDEO_CELEBRATION;
            celebrationVideo.classList.add('show');
            celebrationVideo.play();

            // 3초 후 자동으로 숨김
            setTimeout(() => {
                celebrationVideo.classList.remove('show');
                celebrationVideo.pause();
                comboDisplay.classList.remove('celebration');
            }, 3000);
        }

        // ========================================
        // 터치/클릭 핸들러
        // ========================================
        function handleInput(e) {
            if (!gameState.isPlaying) return;

            let x, y;
            if (e.type.startsWith('touch')) {
                const touch = e.touches[0] || e.changedTouches[0];
                x = touch.clientX;
                y = touch.clientY;
            } else {
                x = e.clientX;
                y = e.clientY;
            }

            // 노트 체크
            for (const note of gameState.notes) {
                const result = note.checkHit(x, y);
                if (result) {
                    showJudgment(result.judgment, result.color);
                    updateScore(result.score);
                    break;
                }
            }
        }

        canvas.addEventListener('click', handleInput);
        canvas.addEventListener('touchstart', handleInput);

        // ========================================
        // 게임 루프
        // ========================================
        function gameLoop(timestamp) {
            if (!gameState.isPlaying) return;

            const currentTime = (timestamp - gameState.startTime) / 1000;
            
            // 캔버스 클리어
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 타겟 그리기
            drawTargets();

            // 노트 업데이트 및 그리기
            for (const note of gameState.notes) {
                note.update(currentTime);
                note.draw();
            }

            // 놓친 노트 제거
            gameState.notes = gameState.notes.filter(note => !note.missed && note.y < canvas.height);

            // 프로그레스 바 업데이트
            if (gameState.audio) {
                const progress = (gameState.audio.currentTime / gameState.audio.duration) * 100;
                progressFill.style.width = progress + '%';

                // 음악 종료 체크
                if (gameState.audio.ended) {
                    endGame();
                }
            }

            requestAnimationFrame(gameLoop);
        }

        // ========================================
        // 카메라 시작
        // ========================================
        async function startCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { 
                        facingMode: 'environment', // 후면 카메라
                        width: { ideal: 1280 },
                        height: { ideal: 720 }
                    },
                    audio: false
                });
                
                videoBackground.srcObject = stream;
                await videoBackground.play();
                console.log('카메라 시작 완료');
                
            } catch (error) {
                console.error('카메라 권한 에러:', error);
                alert('카메라 권한이 필요합니다.');
            }
        }

        // ========================================
        // 게임 시작
        // ========================================
        async function startGame() {
            console.log('게임 시작');
            
            // 상태 초기화
            gameState.score = 0;
            gameState.combo = 0;
            gameState.maxCombo = 0;
            gameState.celebrationShown = false;
            gameState.notes = [];
            scoreDisplay.textContent = '0';
            comboDisplay.textContent = '';
            progressFill.style.width = '0%';

            // 카메라 시작
            await startCamera();

            // 오디오 로드
            gameState.audio = new Audio(CONFIG.AUDIO_FILE);
            
            try {
                await gameState.audio.play();
                
                // 비트맵 생성
                const beatMap = generateBeatMap(gameState.audio.duration);
                
                // 노트 생성
                for (const beat of beatMap) {
                    gameState.notes.push(new Note(beat.time, beat.lane));
                }

                console.log(`총 ${gameState.notes.length}개의 노트 생성`);

                // 게임 시작
                gameState.isPlaying = true;
                gameState.startTime = performance.now();
                requestAnimationFrame(gameLoop);

            } catch (error) {
                console.error('오디오 재생 실패:', error);
                alert('음악 파일을 로드할 수 없습니다.');
            }
        }

        // ========================================
        // 게임 종료
        // ========================================
        function endGame() {
            console.log('게임 종료');
            gameState.isPlaying = false;
            
            // 최종 점수 표시
            finalScoreValue.textContent = gameState.score;
            gameoverScreen.classList.add('show');
        }

        // ========================================
        // 이벤트 리스너
        // ========================================
        document.getElementById('start-btn').addEventListener('click', () => {
            startScreen.classList.add('hidden');
            setTimeout(() => startGame(), 500);
        });

        document.getElementById('restart-btn').addEventListener('click', () => {
            gameoverScreen.classList.remove('show');
            setTimeout(() => startGame(), 300);
        });

        console.log('리듬 게임 준비 완료');
    </script>
</body>
</html>
