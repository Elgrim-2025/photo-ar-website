<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>리듬 게임 - The General Uses Warp</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
            background: #000;
        }

        /* 레이어 1: 카메라 배경 (현실) */
        #camera-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 0;
        }

        /* 레이어 2: AR 캐릭터 비디오 (크로마키 제거) */
        #ar-character {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 50%;
            height: 50%;
            object-fit: contain;
            z-index: 1;
            pointer-events: none;
        }
        
        /* 크로마키 제거를 위한 캔버스 */
        #chroma-canvas {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 50%;
            height: 50%;
            z-index: 1;
            pointer-events: none;
        }

        /* 레이어 3: 게임 캔버스 (노트) */
        #game-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
        }

        /* 레이어 4: HUD */
        #hud {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
        }

        /* 점수 표시 - 작고 세련되게 */
        #score-display {
            position: absolute;
            top: 15px;
            right: 15px;
            text-align: right;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(10px);
            padding: 10px 15px;
            border-radius: 12px;
            border: 1px solid rgba(77, 166, 255, 0.3);
        }

        #score {
            color: #fff;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.5);
        }

        #combo {
            color: #4da6ff;
            font-size: 16px;
            font-weight: bold;
            margin-top: 3px;
        }

        #combo.celebration {
            animation: celebrate 0.5s ease;
            color: #ffaa00;
        }

        @keyframes celebrate {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }

        /* 판정 표시 - 작게 */
        #judgment {
            position: absolute;
            top: 45%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 36px;
            font-weight: bold;
            opacity: 0;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.8);
        }

        #judgment.show {
            animation: judgmentAnim 0.4s ease;
        }

        @keyframes judgmentAnim {
            0% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
            40% { opacity: 1; transform: translate(-50%, -50%) scale(1.1); }
            100% { opacity: 0; transform: translate(-50%, -50%) scale(1); }
        }

        /* 50콤보 축하 메시지 */
        #milestone-message {
            position: absolute;
            top: 30%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 56px;
            font-weight: bold;
            opacity: 0;
            text-shadow: 0 0 30px rgba(255, 170, 0, 1), 0 0 60px rgba(255, 170, 0, 0.8);
            color: #ffaa00;
            pointer-events: none;
            z-index: 20;
        }

        #milestone-message.show {
            animation: milestoneAnim 2s ease;
        }

        @keyframes milestoneAnim {
            0% { 
                opacity: 0; 
                transform: translate(-50%, -50%) scale(0.3) rotate(-10deg); 
            }
            20% { 
                opacity: 1; 
                transform: translate(-50%, -50%) scale(1.3) rotate(5deg); 
            }
            40% { 
                transform: translate(-50%, -50%) scale(1.1) rotate(-3deg); 
            }
            60% { 
                transform: translate(-50%, -50%) scale(1.2) rotate(2deg); 
            }
            80% { 
                opacity: 1;
                transform: translate(-50%, -50%) scale(1.15) rotate(0deg); 
            }
            100% { 
                opacity: 0; 
                transform: translate(-50%, -50%) scale(0.8) rotate(0deg); 
            }
        }

        /* 시작 화면 */
        #start-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            transition: opacity 0.5s ease;
        }

        #start-screen.hidden {
            opacity: 0;
            pointer-events: none;
        }

        #start-screen h1 {
            color: #4da6ff;
            font-size: 36px;
            margin-bottom: 15px;
            text-shadow: 0 0 20px rgba(77, 166, 255, 0.5);
        }

        #start-screen p {
            color: #888;
            font-size: 14px;
            margin-bottom: 30px;
            text-align: center;
            line-height: 1.6;
        }

        #start-btn {
            padding: 15px 50px;
            background: linear-gradient(135deg, #4da6ff, #80c0ff);
            border: none;
            border-radius: 50px;
            color: #000;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 4px 20px rgba(77, 166, 255, 0.5);
            transition: all 0.3s ease;
        }

        #start-btn:hover {
            transform: scale(1.05);
        }

        #start-btn:active {
            transform: scale(0.95);
        }

        /* 게임 오버 화면 */
        #gameover-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        #gameover-screen.show {
            display: flex;
        }

        #gameover-screen h2 {
            color: #4da6ff;
            font-size: 36px;
            margin-bottom: 20px;
        }

        #final-score {
            color: #fff;
            font-size: 28px;
            margin-bottom: 30px;
        }

        #restart-btn {
            padding: 12px 40px;
            background: linear-gradient(135deg, #4da6ff, #80c0ff);
            border: none;
            border-radius: 50px;
            color: #000;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        #restart-btn:hover {
            transform: scale(1.05);
        }

        /* 프로그레스 바 - 작고 세련되게 */
        #progress-bar {
            position: absolute;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
            width: 60%;
            height: 4px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 2px;
            overflow: hidden;
        }

        #progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #4da6ff, #80c0ff);
            width: 0%;
            transition: width 0.1s linear;
        }
    </style>
</head>
<body>
    <!-- 시작 화면 -->
    <div id="start-screen">
        <h1>🎵 장단 맞추기 놀이 🎵</h1>
        <p>장단에 맞게 동그라미를 짓누르라우<br>잇단 명중 열 번을 이루면 성대한 치하가 내려질지비</p>
        <button id="start-btn">훈련 개시</button>
    </div>

    <!-- 레이어 1: 카메라 배경 -->
    <video id="camera-background" playsinline autoplay muted webkit-playsinline></video>

    <!-- 레이어 2: AR 캐릭터 (크로마키 제거) -->
    <video id="ar-character" playsinline loop muted webkit-playsinline style="display: none;"></video>
    <canvas id="chroma-canvas"></canvas>

    <!-- 레이어 3: 게임 캔버스 -->
    <canvas id="game-canvas"></canvas>

    <!-- 레이어 4: HUD -->
    <div id="hud">
        <div id="score-display">
            <div id="score">0</div>
            <div id="combo"></div>
        </div>
        <div id="judgment"></div>
        <div id="milestone-message"></div>
        <div id="progress-bar">
            <div id="progress-fill"></div>
        </div>
    </div>

    <!-- 게임 오버 화면 -->
    <div id="gameover-screen">
        <h2>훈련 종료!</h2>
        <div id="final-score">최종 점수: <span id="final-score-value">0</span>점</div>
        <button id="restart-btn">재훈련</button>
    </div>

    <script>
        // ========================================
        // 게임 설정
        // ========================================
        const CONFIG = {
            AUDIO_FILE: 'The General Uses Warp.mp3',
            VIDEO_NORMAL: 'rydm.mp4',
            VIDEO_CELEBRATION: 'kim-cos-chroma.mp4',
            COMBO_THRESHOLD: 10,
            JUDGMENT_PERFECT: 50,
            JUDGMENT_GOOD: 100,
            JUDGMENT_OK: 150,
            SPAWN_LANES: 4,
            NOTE_RADIUS: 25,
            TARGET_RADIUS: 40,
            HIT_ZONE_Y: 0.85
        };

        // ========================================
        // 게임 상태
        // ========================================
        const gameState = {
            score: 0,
            combo: 0,
            isPlaying: false,
            notes: [],
            audio: null,
            audioContext: null,
            startTime: 0,
            lastMissTime: 0  // 마지막 미스 시간
        };

        // ========================================
        // iOS 오디오 초기화
        // ========================================
        function initAudioContext() {
            if (!gameState.audioContext) {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                gameState.audioContext = new AudioContext();
                console.log('AudioContext 초기화:', gameState.audioContext.state);
            }
            
            // iOS에서는 사용자 제스처 후에 resume 필요
            if (gameState.audioContext.state === 'suspended') {
                gameState.audioContext.resume();
            }
        }

        // ========================================
        // DOM 요소
        // ========================================
        const canvas = document.getElementById('game-canvas');
        const ctx = canvas.getContext('2d');
        const startScreen = document.getElementById('start-screen');
        const gameoverScreen = document.getElementById('gameover-screen');
        const cameraBackground = document.getElementById('camera-background');
        const arCharacter = document.getElementById('ar-character');
        const chromaCanvas = document.getElementById('chroma-canvas');
        const chromaCtx = chromaCanvas.getContext('2d');
        const scoreDisplay = document.getElementById('score');
        const comboDisplay = document.getElementById('combo');
        const judgmentDisplay = document.getElementById('judgment');
        const milestoneMessage = document.getElementById('milestone-message');
        const progressFill = document.getElementById('progress-fill');
        const finalScoreValue = document.getElementById('final-score-value');

        // ========================================
        // 크로마키 제거 (실시간)
        // ========================================
        let chromaKeyRunning = false;
        
        function startChromaKey() {
            if (chromaKeyRunning) return;
            chromaKeyRunning = true;
            
            function processFrame() {
                if (!chromaKeyRunning) return;
                
                if (arCharacter.readyState === arCharacter.HAVE_ENOUGH_DATA) {
                    chromaCanvas.width = arCharacter.videoWidth;
                    chromaCanvas.height = arCharacter.videoHeight;
                    
                    chromaCtx.drawImage(arCharacter, 0, 0);
                    const frame = chromaCtx.getImageData(0, 0, chromaCanvas.width, chromaCanvas.height);
                    const data = frame.data;
                    
                    // 초록색 크로마키 제거
                    for (let i = 0; i < data.length; i += 4) {
                        const r = data[i];
                        const g = data[i + 1];
                        const b = data[i + 2];
                        
                        // 초록색 판별 (녹색이 다른 색상보다 훨씬 강할 때)
                        if (g > 90 && g > r * 1.4 && g > b * 1.4) {
                            data[i + 3] = 0; // 완전히 투명하게
                        }
                    }
                    
                    chromaCtx.putImageData(frame, 0, 0);
                }
                requestAnimationFrame(processFrame);
            }
            
            processFrame();
        }

        // ========================================
        // 캔버스 크기 설정
        // ========================================
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // ========================================
        // 박자 맵 생성
        // ========================================
        const BPM = 140;
        const BEAT_INTERVAL = 60 / BPM;

        function generateBeatMap(duration) {
            const beatMap = [];
            let time = 1.0;
            const maxDuration = Math.min(duration, 60); // 최대 60초
            
            while (time < maxDuration - 2) {
                beatMap.push({ time, lane: Math.floor(Math.random() * CONFIG.SPAWN_LANES) });
                
                if (Math.random() > 0.5) {
                    beatMap.push({ 
                        time: time + BEAT_INTERVAL / 2, 
                        lane: Math.floor(Math.random() * CONFIG.SPAWN_LANES) 
                    });
                }
                
                time += BEAT_INTERVAL;
            }
            
            return beatMap;
        }

        // ========================================
        // 레인 계산
        // ========================================
        function getLaneX(lane) {
            const spacing = canvas.width / (CONFIG.SPAWN_LANES + 1);
            return spacing * (lane + 1);
        }

        // ========================================
        // 노트 클래스
        // ========================================
        class Note {
            constructor(time, lane) {
                this.spawnTime = time;
                this.lane = lane;
                this.x = getLaneX(lane);
                this.y = -CONFIG.NOTE_RADIUS;
                this.targetY = canvas.height * CONFIG.HIT_ZONE_Y;
                this.hit = false;
                this.missed = false;
            }

            update(currentTime) {
                const elapsed = currentTime - this.spawnTime;
                const travelTime = 2.0;
                const progress = elapsed / travelTime;
                
                this.y = -CONFIG.NOTE_RADIUS + progress * (this.targetY + CONFIG.NOTE_RADIUS);

                if (this.y > this.targetY + CONFIG.JUDGMENT_OK && !this.hit && !this.missed) {
                    this.missed = true;
                    
                    // 0.5초에 한 번만 아오지 표시 (중복 방지)
                    const now = performance.now();
                    if (now - gameState.lastMissTime > 500) {
                        gameState.combo = 0;
                        comboDisplay.textContent = '';
                        showJudgment('아오지', '#ff0000');
                        gameState.lastMissTime = now;
                    }
                }
            }

            draw() {
                if (this.hit || this.missed) return;

                ctx.save();
                ctx.shadowColor = 'rgba(77, 166, 255, 0.8)';
                ctx.shadowBlur = 15;
                
                ctx.beginPath();
                ctx.arc(this.x, this.y, CONFIG.NOTE_RADIUS, 0, Math.PI * 2);
                ctx.strokeStyle = '#4da6ff';
                ctx.lineWidth = 3;
                ctx.stroke();
                
                const gradient = ctx.createRadialGradient(this.x, this.y, 0, this.x, this.y, CONFIG.NOTE_RADIUS);
                gradient.addColorStop(0, 'rgba(77, 166, 255, 0.8)');
                gradient.addColorStop(1, 'rgba(77, 166, 255, 0.3)');
                ctx.fillStyle = gradient;
                ctx.fill();
                
                ctx.restore();
            }

            checkHit(touchX, touchY) {
                const distance = Math.sqrt((touchX - this.x) ** 2 + (touchY - this.y) ** 2);
                const timingError = Math.abs(this.y - this.targetY);

                if (distance < CONFIG.NOTE_RADIUS + CONFIG.TARGET_RADIUS && !this.hit) {
                    this.hit = true;

                    if (timingError < CONFIG.JUDGMENT_PERFECT) {
                        return { judgment: '최고라우!', score: 100, color: '#ffaa00' };
                    } else if (timingError < CONFIG.JUDGMENT_GOOD) {
                        return { judgment: '적당하기만', score: 50, color: '#4da6ff' };
                    } else if (timingError < CONFIG.JUDGMENT_OK) {
                        return { judgment: '아오지', score: 20, color: '#aaa' };
                    }
                }
                return null;
            }
        }

        // ========================================
        // 타겟 그리기
        // ========================================
        function drawTargets() {
            const targetY = canvas.height * CONFIG.HIT_ZONE_Y;
            
            for (let i = 0; i < CONFIG.SPAWN_LANES; i++) {
                const x = getLaneX(i);
                
                ctx.save();
                ctx.globalAlpha = 0.25;
                
                ctx.beginPath();
                ctx.arc(x, targetY, CONFIG.TARGET_RADIUS, 0, Math.PI * 2);
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 2;
                ctx.stroke();
                
                ctx.beginPath();
                ctx.arc(x, targetY, CONFIG.TARGET_RADIUS - 8, 0, Math.PI * 2);
                ctx.strokeStyle = '#fff';
                ctx.lineWidth = 1.5;
                ctx.stroke();
                
                ctx.restore();
            }
        }

        // ========================================
        // 판정 표시
        // ========================================
        function showJudgment(judgment, color) {
            judgmentDisplay.textContent = judgment;
            judgmentDisplay.style.color = color;
            judgmentDisplay.classList.remove('show');
            void judgmentDisplay.offsetWidth;
            judgmentDisplay.classList.add('show');
        }

        // ========================================
        // 점수 업데이트
        // ========================================
        function updateScore(points) {
            gameState.score += points;
            gameState.combo++;

            scoreDisplay.textContent = gameState.score;
            comboDisplay.textContent = gameState.combo > 0 ? `${gameState.combo} 련속타격` : '';

            // 50의 배수 콤보 달성 시 축하 메시지 + AR 캐릭터 교체
            if (gameState.combo > 0 && gameState.combo % 50 === 0) {
                showMilestone();
                showCelebration();
            }
        }

        // ========================================
        // 50콤보 축하 메시지
        // ========================================
        function showMilestone() {
            milestoneMessage.textContent = '훌륭하구만 기래';
            milestoneMessage.classList.remove('show');
            void milestoneMessage.offsetWidth; // 리플로우 강제
            milestoneMessage.classList.add('show');
            
            // 2초 후 클래스 제거
            setTimeout(() => {
                milestoneMessage.classList.remove('show');
            }, 2000);
        }

        // ========================================
        // 축하 AR 캐릭터 교체
        // ========================================
        function showCelebration() {
            comboDisplay.classList.add('celebration');
            
            // AR 캐릭터를 축하 영상으로 교체
            arCharacter.src = CONFIG.VIDEO_CELEBRATION;
            arCharacter.loop = false;
            arCharacter.play();

            // 영상 끝나면 다시 일반 영상으로
            arCharacter.addEventListener('ended', () => {
                arCharacter.src = CONFIG.VIDEO_NORMAL;
                arCharacter.loop = true;
                arCharacter.play();
                comboDisplay.classList.remove('celebration');
            }, { once: true });
        }

        // ========================================
        // 터치/클릭 핸들러
        // ========================================
        function handleInput(e) {
            if (!gameState.isPlaying) return;

            let x, y;
            if (e.type.startsWith('touch')) {
                const touch = e.touches[0] || e.changedTouches[0];
                x = touch.clientX;
                y = touch.clientY;
            } else {
                x = e.clientX;
                y = e.clientY;
            }

            for (const note of gameState.notes) {
                const result = note.checkHit(x, y);
                if (result) {
                    showJudgment(result.judgment, result.color);
                    updateScore(result.score);
                    break;
                }
            }
        }

        canvas.addEventListener('click', handleInput);
        canvas.addEventListener('touchstart', handleInput);

        // ========================================
        // 게임 루프
        // ========================================
        function gameLoop(timestamp) {
            if (!gameState.isPlaying) return;

            const currentTime = (timestamp - gameState.startTime) / 1000;
            
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            drawTargets();

            for (const note of gameState.notes) {
                note.update(currentTime);
                note.draw();
            }

            gameState.notes = gameState.notes.filter(note => !note.missed && note.y < canvas.height);

            if (gameState.audio) {
                const progress = (gameState.audio.currentTime / 60) * 100; // 60초 기준
                progressFill.style.width = progress + '%';

                // 1분(60초) 경과 또는 음악 종료 시 게임 종료
                if (gameState.audio.currentTime >= 60 || gameState.audio.ended) {
                    endGame();
                }
            }

            requestAnimationFrame(gameLoop);
        }

        // ========================================
        // 카메라 시작
        // ========================================
        async function startCamera() {
            try {
                const constraints = {
                    video: { 
                        facingMode: 'environment',
                        width: { ideal: 1280 },
                        height: { ideal: 720 }
                    },
                    audio: false
                };
                
                // iOS fallback
                if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                    throw new Error('카메라 API를 사용할 수 없습니다.');
                }
                
                const stream = await navigator.mediaDevices.getUserMedia(constraints);
                cameraBackground.srcObject = stream;
                
                // iOS 호환성을 위한 명시적 재생
                cameraBackground.muted = true;
                cameraBackground.playsInline = true;
                await cameraBackground.play();
                
                console.log('카메라 시작 완료');
                
            } catch (error) {
                console.error('카메라 에러:', error);
                
                // 후면 카메라 실패 시 전면 카메라 시도
                try {
                    const fallbackStream = await navigator.mediaDevices.getUserMedia({
                        video: { facingMode: 'user' },
                        audio: false
                    });
                    cameraBackground.srcObject = fallbackStream;
                    cameraBackground.muted = true;
                    cameraBackground.playsInline = true;
                    await cameraBackground.play();
                    console.log('전면 카메라로 시작');
                } catch (e2) {
                    alert('카메라 권한이 필요합니다.');
                    throw e2;
                }
            }
        }

        // ========================================
        // 게임 시작
        // ========================================
        async function startGame() {
            console.log('게임 시작');
            
            gameState.score = 0;
            gameState.combo = 0;
            gameState.notes = [];
            gameState.lastMissTime = 0;
            scoreDisplay.textContent = '0';
            comboDisplay.textContent = '';
            progressFill.style.width = '0%';

            try {
                // iOS 오디오 컨텍스트 초기화
                initAudioContext();
                
                // 카메라 시작
                await startCamera();

                // 오디오 먼저 로드 (iOS 호환성)
                gameState.audio = new Audio(CONFIG.AUDIO_FILE);
                gameState.audio.crossOrigin = 'anonymous';
                gameState.audio.preload = 'auto';
                gameState.audio.load();
                
                // iOS에서 오디오가 로드될 때까지 대기
                await new Promise((resolve, reject) => {
                    gameState.audio.addEventListener('canplaythrough', resolve, { once: true });
                    gameState.audio.addEventListener('error', reject, { once: true });
                    setTimeout(() => reject(new Error('오디오 로드 타임아웃')), 10000);
                });
                
                console.log('오디오 로드 완료, 길이:', gameState.audio.duration);
                
                // 오디오 재생 시작
                await gameState.audio.play();
                console.log('오디오 재생 시작');

                // AR 캐릭터 시작
                arCharacter.src = CONFIG.VIDEO_NORMAL;
                arCharacter.muted = true;
                arCharacter.playsInline = true;
                await arCharacter.play();
                console.log('AR 캐릭터 재생 시작');
                
                // 크로마키 처리 시작
                startChromaKey();

                // 비트맵 생성
                const beatMap = generateBeatMap(gameState.audio.duration);
                
                for (const beat of beatMap) {
                    gameState.notes.push(new Note(beat.time, beat.lane));
                }

                console.log(`총 ${gameState.notes.length}개의 노트 생성`);

                gameState.isPlaying = true;
                gameState.startTime = performance.now();
                requestAnimationFrame(gameLoop);

            } catch (error) {
                console.error('게임 시작 실패:', error);
                alert('게임을 시작할 수 없습니다.\n' + error.message);
            }
        }

        // ========================================
        // 게임 종료
        // ========================================
        function endGame() {
            console.log('게임 종료');
            gameState.isPlaying = false;
            
            // 오디오 정지
            if (gameState.audio) {
                gameState.audio.pause();
                gameState.audio.currentTime = 0;
            }
            
            finalScoreValue.textContent = gameState.score;
            gameoverScreen.classList.add('show');
        }

        // ========================================
        // 이벤트 리스너
        // ========================================
        document.getElementById('start-btn').addEventListener('click', () => {
            startScreen.classList.add('hidden');
            setTimeout(() => startGame(), 500);
        });

        document.getElementById('restart-btn').addEventListener('click', () => {
            gameoverScreen.classList.remove('show');
            setTimeout(() => startGame(), 300);
        });

        console.log('리듬 게임 준비 완료');
    </script>
</body>
</html>
